<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suppression de fond - ToolForge</title>

<meta name="description" content="Supprimez automatiquement l’arrière-plan de vos images directement dans votre navigateur.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}


body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}


.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}


.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}


h1{
margin-bottom:10px;
}


p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6;
}


input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}


button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}



/* panneau vert */

#colorPanel{

display:none;
padding:15px;
border:1px solid var(--border);
border-radius:12px;
margin-bottom:15px;

}


.colorBtn{

margin-bottom:8px;

}


#picker{

background:#24324D;

}




/* preview */

.preview-before{

display:none;
margin-top:20px;

}


.preview-before img{

width:100%;
border-radius:10px;

}





/* comparaison */

.compare{

position:relative;
width:100%;
height:500px;
overflow:hidden;
border-radius:10px;
margin-top:20px;
display:none;

background:#0B1220;

}



.compare img{

position:absolute;

width:100%;
height:100%;

object-fit:contain;

}




.before{

clip-path:inset(0 50% 0 0);
z-index:2;

}





.after{

clip-path:inset(0 0 0 50%);
z-index:2;

}




.slider{

position:absolute;

top:0;
left:50%;

height:100%;
width:3px;

background:white;

z-index:5;

}



.handle{

position:absolute;

top:50%;
left:50%;


transform:translate(-50%,-50%);


width:42px;
height:42px;


border-radius:50%;


background:var(--accent);


display:flex;
align-items:center;
justify-content:center;


font-size:20px;


box-shadow:0 0 12px #000;

}





.download{

display:none;

text-align:center;

padding:12px;

margin-top:10px;

background:var(--accent);

color:white;

text-decoration:none;

border-radius:10px;

}



.status{

margin-top:10px;

color:var(--muted);

}



</style>

</head>


<body>


<div class="container">


<div class="card">



<h1>Suppression de fond</h1>


<p>
Supprimez automatiquement l’arrière-plan de vos images directement dans le navigateur.
</p>




<input type="file" id="file" accept="image/*">




<label style="display:flex;gap:10px;align-items:center;margin-bottom:15px;">

<input 
type="checkbox" 
id="greenMode"
style="width:auto;">

Fond vert

</label>




<div id="colorPanel">


<button class="colorBtn" data-color="0,255,0">
Vert
</button>


<button class="colorBtn" data-color="0,200,0">
Vert foncé
</button>


<button class="colorBtn" data-color="0,255,255">
Cyan
</button>


<button id="picker">
🖌 Pipette
</button>


</div>





<button id="remove">

Supprimer le fond

</button>





<div class="preview-before">

<img id="beforePreview">

</div>





<div class="compare" id="compare">


<img id="before">


<img id="after" class="after">



<div class="slider" id="slider">


<div class="handle">
⇆
</div>


</div>


</div>





<a id="download" class="download">
Télécharger
</a>




<div class="status" id="status"></div>




</div>

</div>






<script>


const fileInput=document.getElementById("file");
const removeBtn=document.getElementById("remove");

const before=document.getElementById("before");
const after=document.getElementById("after");
const beforePreview=document.getElementById("beforePreview");

const compare=document.getElementById("compare");
const slider=document.getElementById("slider");

const download=document.getElementById("download");
const status=document.getElementById("status");


const greenMode=document.getElementById("greenMode");
const colorPanel=document.getElementById("colorPanel");
const picker=document.getElementById("picker");


let imageFile=null;
let selectedColor=null;
let picking=false;





greenMode.onchange=()=>{

colorPanel.style.display =
greenMode.checked ? "block":"none";

};





document.querySelectorAll(".colorBtn")
.forEach(btn=>{


btn.onclick=()=>{

selectedColor=
btn.dataset.color
.split(",")
.map(Number);

};

});






picker.onclick=()=>{

picking=true;

status.textContent=
"Cliquez sur une couleur dans l'image";

};






beforePreview.onclick=e=>{


if(!picking)return;



const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");



canvas.width=beforePreview.naturalWidth;

canvas.height=beforePreview.naturalHeight;



ctx.drawImage(
beforePreview,
0,
0
);



const rect=
beforePreview.getBoundingClientRect();



let x=
(e.clientX-rect.left)
/
rect.width
*
canvas.width;



let y=
(e.clientY-rect.top)
/
rect.height
*
canvas.height;





let pixel=
ctx.getImageData(
Math.floor(x),
Math.floor(y),
1,
1
).data;




selectedColor=[

pixel[0],
pixel[1],
pixel[2]

];



picking=false;


status.textContent=
"Couleur sélectionnée";


};






fileInput.onchange=e=>{


imageFile=e.target.files[0];


if(!imageFile)return;



const url=
URL.createObjectURL(imageFile);



before.src=url;

beforePreview.src=url;

after.src="";



compare.style.display="none";

download.style.display="none";



document.querySelector(".preview-before")
.style.display="block";



status.textContent=
"Image chargée";


};







removeBtn.onclick=()=>{


if(!imageFile)return;



const img=new Image();


img.src=
URL.createObjectURL(imageFile);



img.onload=()=>{



const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");



canvas.width=img.width;

canvas.height=img.height;



ctx.drawImage(img,0,0);



const imageData=
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



const data=imageData.data;



/* couleur moyenne des bords */


let colors=[];



function sample(x,y){

let i=(y*canvas.width+x)*4;

colors.push([

data[i],
data[i+1],
data[i+2]

]);

}



for(let x=0;x<canvas.width;x+=20){

sample(x,0);

sample(x,canvas.height-1);

}



for(let y=0;y<canvas.height;y+=20){

sample(0,y);

sample(canvas.width-1,y);

}



let avg=[0,0,0];


colors.forEach(c=>{

avg[0]+=c[0];
avg[1]+=c[1];
avg[2]+=c[2];

});


avg[0]/=colors.length;
avg[1]/=colors.length;
avg[2]/=colors.length;







for(let i=0;i<data.length;i+=4){



let r=data[i];
let g=data[i+1];
let b=data[i+2];



let remove=false;



/* fond vert */

if(
greenMode.checked &&
selectedColor
){


let d=Math.sqrt(

(r-selectedColor[0])**2+
(g-selectedColor[1])**2+
(b-selectedColor[2])**2

);



if(d<100)
remove=true;


}



/* automatique */

else{


let d=Math.sqrt(

(r-avg[0])**2+
(g-avg[1])**2+
(b-avg[2])**2

);



if(d<80)
remove=true;


}



if(remove){

data[i+3]=0;

}


}




ctx.putImageData(
imageData,
0,
0
);



const url=
canvas.toDataURL("image/png");



after.src=url;



compare.style.display="block";



slider.style.left="50%";



download.href=url;

download.download=
"toolforge-transparent.png";


download.style.display="block";



status.textContent=
"Fond supprimé";


};



};








/* slider */

let dragging=false;



compare.onmousedown=()=>dragging=true;

window.onmouseup=()=>dragging=false;



window.onmousemove=e=>{


if(!dragging)return;



const rect=
compare.getBoundingClientRect();



let x=e.clientX-rect.left;



x=Math.max(
0,
Math.min(
x,
rect.width
)
);



let percent=
x/rect.width*100;



slider.style.left=
percent+"%";



after.style.clipPath=
`inset(0 ${100-percent}% 0 0)`;


before.style.clipPath=
`inset(0 0 0 ${percent}%)`;



};



</script>


</body>

</html>
