<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#0B1220;
color:white;
}

.container{
width:900px;
max-width:95%;
margin:auto;
padding:30px;
}

.card{
background:#151F32;
padding:20px;
border-radius:15px;
border:1px solid #24324D;
}

h1{margin-bottom:10px}
p{opacity:.7}

.upload{
width:100%;
padding:10px;
margin:10px 0;
background:#0B1220;
color:white;
border:1px solid #24324D;
border-radius:10px;
}

.stage{
position:relative;
display:inline-block;
max-width:100%;
margin-top:15px;
}

.stage img{
max-width:100%;
display:block;
border-radius:10px;
}

.crop-box{
position:absolute;
border:2px dashed #4F8CFF;
background:rgba(79,140,255,0.15);
cursor:move;
}

.handle{
width:10px;
height:10px;
background:#4F8CFF;
position:absolute;
right:-5px;
bottom:-5px;
cursor:se-resize;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:#4F8CFF;
border:none;
color:white;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.download{
display:none;
margin-top:10px;
text-align:center;
padding:10px;
background:#4F8CFF;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Crop Image</h1>
<p>Déplace et redimensionne le cadre pour recadrer.</p>

<input class="upload" type="file" id="file" accept="image/*">

<div class="stage" id="stage">
<img id="img">
<div class="crop-box" id="box">
<div class="handle" id="handle"></div>
</div>
</div>

<button id="crop">Recadrer</button>

<a id="download" class="download">Télécharger</a>

</div>
</div>

<script>

const file = document.getElementById("file");
const img = document.getElementById("img");
const box = document.getElementById("box");
const handle = document.getElementById("handle");
const stage = document.getElementById("stage");
const download = document.getElementById("download");

let isDragging = false;
let isResizing = false;

let startX, startY, startW, startH;

file.addEventListener("change", (e)=>{
img.src = URL.createObjectURL(e.target.files[0]);

img.onload = ()=>{
box.style.left = "20px";
box.style.top = "20px";
box.style.width = "150px";
box.style.height = "150px";
};
});

// drag box
box.addEventListener("mousedown", (e)=>{
if(e.target === handle) return;
isDragging = true;
startX = e.clientX - box.offsetLeft;
startY = e.clientY - box.offsetTop;
});

document.addEventListener("mousemove", (e)=>{
if(isDragging){
box.style.left = (e.clientX - startX) + "px";
box.style.top = (e.clientY - startY) + "px";
}

if(isResizing){
box.style.width = (e.clientX - box.offsetLeft) + "px";
box.style.height = (e.clientY - box.offsetTop) + "px";
}
});

document.addEventListener("mouseup", ()=>{
isDragging = false;
isResizing = false;
});

handle.addEventListener("mousedown",(e)=>{
e.stopPropagation();
isResizing = true;
});

// crop
document.getElementById("crop").addEventListener("click", ()=>{

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const scaleX = img.naturalWidth / img.width;
const scaleY = img.naturalHeight / img.height;

const x = box.offsetLeft * scaleX;
const y = box.offsetTop * scaleY;
const w = box.offsetWidth * scaleX;
const h = box.offsetHeight * scaleY;

canvas.width = w;
canvas.height = h;

ctx.drawImage(img, x, y, w, h, 0, 0, w, h);

canvas.toBlob((blob)=>{

const url = URL.createObjectURL(blob);

download.href = url;
download.download = "toolforge-crop.jpg";
download.style.display = "block";

});

});

</script>

</body>
</html>
