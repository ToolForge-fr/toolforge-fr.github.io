<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’image - ToolForge</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<style>

body{
font-family:Inter,Arial,sans-serif;
background:#0B1220;
color:white;
margin:0;
}

header{
padding:30px;
text-align:center;
border-bottom:1px solid #24324D;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.box{
background:#151F32;
border:1px solid #24324D;
border-radius:18px;
padding:25px;
}

input,button{
margin-top:15px;
padding:12px;
border-radius:10px;
border:none;
}

button{
background:#4F8CFF;
color:white;
cursor:pointer;
}

#preview{
max-width:100%;
margin-top:20px;
}

</style>

</head>


<body>


<header>

<h1>Redimensionneur d’image</h1>

<p>
Redimensionnez et recadrez vos images gratuitement.
</p>

</header>



<div class="container">


<div class="box">


<input type="file" id="upload" accept="image/*">


<img id="preview">



<br>


<label>
Largeur :
<input type="number" id="width">
</label>


<label>
Hauteur :
<input type="number" id="height">
</label>


<br>


<button onclick="downloadImage()">
Télécharger l’image
</button>



</div>


</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>


<script>


let cropper;


const upload=document.getElementById("upload");
const image=document.getElementById("preview");


upload.onchange=function(e){


const file=e.target.files[0];


if(!file)return;


image.src=URL.createObjectURL(file);



if(cropper){
cropper.destroy();
}



cropper=new Cropper(image,{

viewMode:1,

dragMode:"move",

autoCropArea:0.8,

aspectRatio:NaN,

responsive:true,

crop(event){

document.getElementById("width").value=
Math.round(event.detail.width);


document.getElementById("height").value=
Math.round(event.detail.height);

}

});


};



function downloadImage(){


if(!cropper)return;


const canvas=cropper.getCroppedCanvas();


const link=document.createElement("a");

link.download="image-redimensionnee.png";

link.href=canvas.toDataURL();


link.click();


}



</script>


</body>

</html>
