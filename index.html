<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolForge - Outils en ligne gratuits</title>
<meta name="description" content="Outils gratuits : audio, vidéo, image, PDF, screen recorder, QR generator.">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  text-align:center;
  padding:50px 20px;
}

h1{font-size:40px;margin:0;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
  background:#273449;
}
</style>

</head>

<body>

<header>
<h1>ToolForge</h1>
<p>Suite d’outils gratuits en ligne</p>
</header>

<div class="grid">

<a class="card" href="audio/">Audio Tools</a>
<a class="card" href="video/">Video Tools</a>
<a class="card" href="image/">Image Tools</a>
<a class="card" href="screen/">Screen Recorder</a>
<a class="card" href="pdf/">PDF Tools</a>

</div>

</body>
</html>
