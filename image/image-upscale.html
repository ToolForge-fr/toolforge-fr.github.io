<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suppression de fond - ToolForge</title>

<meta name="description" content="Supprimez automatiquement l’arrière-plan de vos images directement dans votre navigateur.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}


body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}


.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}


.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}


h1{
margin-bottom:10px;
}


p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6;
}


input,button{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;

}


button{

background:var(--accent);
cursor:pointer;
font-weight:600;

}



/* preview */

.preview-before{

display:none;
margin-top:20px;

}


.preview-before img{

width:100%;
border-radius:10px;

}



/* comparaison */

.compare{

position:relative;
width:100%;
height:500px;
overflow:hidden;
border-radius:10px;
margin-top:20px;
display:none;

background:#0B1220;

}



.compare img{

position:absolute;

width:100%;
height:100%;

object-fit:contain;

}



/* avant */

.before{

clip-path:inset(0 50% 0 0);

z-index:2;

}



/* après */

.after{

clip-path:inset(0 0 0 50%);

z-index:2;

}




.slider{

position:absolute;

top:0;
left:50%;

height:100%;

width:3px;

background:white;

z-index:5;

}



.handle{

position:absolute;

top:50%;
left:50%;


transform:translate(-50%,-50%);


width:42px;
height:42px;


border-radius:50%;


background:var(--accent);


display:flex;
align-items:center;
justify-content:center;


font-size:20px;


box-shadow:0 0 12px #000;

}




.download{

display:none;

text-align:center;

padding:12px;

margin-top:10px;

background:var(--accent);

color:white;

text-decoration:none;

border-radius:10px;

}



.status{

margin-top:10px;

color:var(--muted);

}


</style>

</head>


<body>


<div class="container">

<div class="card">


<h1>Suppression de fond</h1>


<p>
Supprimez automatiquement l’arrière-plan de vos images directement dans le navigateur.
</p>



<input type="file" id="file" accept="image/*">



<button id="remove">

Supprimer le fond

</button>



<div class="preview-before">

<img id="beforePreview">

</div>





<div class="compare" id="compare">


<img id="before">


<img id="after" class="after">



<div class="slider" id="slider">

<div class="handle">
⇆
</div>


</div>



</div>





<a id="download" class="download">

Télécharger

</a>



<div class="status" id="status"></div>


</div>

</div>





<script>


const fileInput=document.getElementById("file");

const removeBtn=document.getElementById("remove");


const before=document.getElementById("before");

const after=document.getElementById("after");

const beforePreview=document.getElementById("beforePreview");


const compare=document.getElementById("compare");

const slider=document.getElementById("slider");


const download=document.getElementById("download");

const status=document.getElementById("status");


let imageFile=null;





fileInput.onchange=e=>{


imageFile=e.target.files[0];

if(!imageFile)return;



const url=URL.createObjectURL(imageFile);



before.src=url;

beforePreview.src=url;


after.src="";


compare.style.display="none";

download.style.display="none";


document.querySelector(".preview-before").style.display="block";


status.textContent="Image chargée";

};






removeBtn.onclick=()=>{


if(!imageFile)return;



const img=new Image();

img.src=URL.createObjectURL(imageFile);



img.onload=()=>{


const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");



canvas.width=img.width;

canvas.height=img.height;



ctx.drawImage(img,0,0);



const imageData=ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



const data=imageData.data;



/* récupération couleur du fond */

let colors=[];


function sample(x,y){

let i=(y*canvas.width+x)*4;

colors.push([
data[i],
data[i+1],
data[i+2]
]);

}



for(let x=0;x<canvas.width;x+=20){

sample(x,0);
sample(x,canvas.height-1);

}



for(let y=0;y<canvas.height;y+=20){

sample(0,y);
sample(canvas.width-1,y);

}




let avg=[0,0,0];


colors.forEach(c=>{

avg[0]+=c[0];
avg[1]+=c[1];
avg[2]+=c[2];

});



avg[0]/=colors.length;
avg[1]/=colors.length;
avg[2]/=colors.length;





/* suppression */

for(let i=0;i<data.length;i+=4){


let r=data[i];

let g=data[i+1];

let b=data[i+2];



let dist=Math.sqrt(

(r-avg[0])**2+
(g-avg[1])**2+
(b-avg[2])**2

);




if(dist<75){

data[i+3]=0;

}

else if(dist<140){

data[i+3]*=(dist-75)/65;

}


}



ctx.putImageData(imageData,0,0);



const url=canvas.toDataURL("image/png");



after.src=url;



compare.style.display="block";

slider.style.left="50%";



download.href=url;

download.download="toolforge-background-remove.png";

download.style.display="block";



status.textContent="Fond supprimé";



};


};







/* slider */


let dragging=false;


compare.addEventListener("mousedown",()=>{

dragging=true;

});


window.addEventListener("mouseup",()=>{

dragging=false;

});




window.addEventListener("mousemove",e=>{


if(!dragging)return;



const rect=compare.getBoundingClientRect();



let x=e.clientX-rect.left;


x=Math.max(
0,
Math.min(
x,
rect.width
)
);



let percent=x/rect.width*100;



slider.style.left=percent+"%";



after.style.clipPath=
`inset(0 ${100-percent}% 0 0)`;


before.style.clipPath=
`inset(0 0 0 ${percent}%)`;



});



</script>


</body>

</html>
