<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’Image - ToolForge</title>

<meta name="description" content="Redimensionnez vos images gratuitement avec ToolForge.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}


.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}


.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}


h1{
margin-bottom:10px;
}


p{
color:var(--muted);
margin-bottom:20px;
}


input,button{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;

}


button{

background:var(--accent);
cursor:pointer;

}




.workspace{

margin-top:20px;

width:100%;

height:500px;

display:flex;

align-items:center;

justify-content:center;

background:#0B1220;

border-radius:15px;

overflow:hidden;

padding:30px;

}




.resize-box{

position:relative;

border:2px solid var(--accent);

max-width:100%;

max-height:100%;

}



.resize-box img{

display:block;

max-width:650px;

max-height:420px;

width:auto;

height:auto;

}





.handle{

position:absolute;

width:14px;

height:14px;

background:var(--accent);

border-radius:50%;

right:-7px;

bottom:-7px;

cursor:nwse-resize;

}





.download{

display:none;

text-align:center;

padding:12px;

margin-top:10px;

background:var(--accent);

color:white;

text-decoration:none;

border-radius:10px;

}




.status{

color:var(--muted);

margin-top:10px;

}



</style>


</head>



<body>


<div class="container">


<div class="card">


<h1>Redimensionneur d’Image</h1>


<p>
Modifiez la taille de votre image sans la recadrer.
</p>



<input type="file" id="file" accept="image/*">



<div class="workspace">


<div class="resize-box" id="box">


<img id="preview">


<div class="handle" id="handle"></div>


</div>


</div>




<label>Largeur</label>

<input id="width" type="number">


<label>Hauteur</label>

<input id="height" type="number">


<label>

<input type="checkbox" id="ratio" checked>

Garder les proportions

</label>



<button id="resize">

Redimensionner

</button>



<a id="download" class="download">

Télécharger

</a>


<div class="status" id="status"></div>



</div>

</div>





<script>


const file=document.getElementById("file");

const preview=document.getElementById("preview");

const box=document.getElementById("box");

const handle=document.getElementById("handle");


const width=document.getElementById("width");

const height=document.getElementById("height");

const ratio=document.getElementById("ratio");


const download=document.getElementById("download");

const status=document.getElementById("status");

const btn=document.getElementById("resize");


let originalRatio;



file.onchange=e=>{


const img=e.target.files[0];


if(!img)return;


preview.src=URL.createObjectURL(img);



preview.onload=()=>{


originalRatio=preview.naturalWidth/preview.naturalHeight;


width.value=preview.naturalWidth;

height.value=preview.naturalHeight;


};


status.textContent="Image chargée";


};





width.oninput=()=>{

if(ratio.checked){

height.value=Math.round(width.value/originalRatio);

}

};



height.oninput=()=>{

if(ratio.checked){

width.value=Math.round(height.value*originalRatio);

}

};






let resizing=false;



handle.onmousedown=()=>{

resizing=true;

};



window.onmouseup=()=>{

resizing=false;

};



window.onmousemove=e=>{


if(!resizing)return;



const rect=box.getBoundingClientRect();


let newWidth=e.clientX-rect.left;


if(newWidth<100)newWidth=100;



preview.style.width=newWidth+"px";


width.value=Math.round(newWidth);



if(ratio.checked){

height.value=
Math.round(newWidth/originalRatio);

}



};






btn.onclick=()=>{


const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");



canvas.width=Number(width.value);

canvas.height=Number(height.value);



ctx.drawImage(

preview,

0,

0,

canvas.width,

canvas.height

);



const url=canvas.toDataURL("image/png");



download.href=url;

download.download="toolforge-resize.png";

download.style.display="block";


status.textContent="Image redimensionnée";


};



</script>


</body>

</html>
