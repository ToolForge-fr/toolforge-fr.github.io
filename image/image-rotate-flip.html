<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotation Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
}

input,button,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}

/* stage */
.stage{
margin-top:20px;
display:none;
justify-content:center;
align-items:center;
height:500px;
background:#0B1220;
border-radius:15px;
position:relative;
overflow:hidden;
}

#img{
max-width:100%;
max-height:100%;
transform-origin:center center;
}

/* angle input row */
.row{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

.row input{
flex:2;
}

.row select{
flex:1;
}

/* mirror */
.mirror{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
color:var(--muted);
}

.mirror label{
min-width:160px;
text-align:left;
}

.mirror input{
width:auto;
}

/* angle display */
.angle{
text-align:center;
color:var(--muted);
margin:10px 0;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Rotation d’image</h1>

<p>Rotation + miroir avec unités modifiables.</p>

<input type="file" id="file" accept="image/*">

<div class="stage" id="stage">
<img id="img">
</div>

<!-- ANGLE + UNIT -->
<div class="row">
<input type="number" id="angleInput" value="0">
<select id="unit">
<option value="deg">Degrés</option>
<option value="rad">Radians</option>
</select>
</div>

<div class="angle" id="angleText">0°</div>

<!-- MIRROR -->
<div class="mirror">
<label>Image miroir</label>
<input type="checkbox" id="mirror">
</div>

<button id="downloadBtn">Télécharger</button>

<br><br>

</div>

</div>

<script>

const file=document.getElementById("file");
const img=document.getElementById("img");
const stage=document.getElementById("stage");
const angleInput=document.getElementById("angleInput");
const unit=document.getElementById("unit");
const mirror=document.getElementById("mirror");
const angleText=document.getElementById("angleText");

let angleDeg=0;

file.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

img.src=URL.createObjectURL(f);
stage.style.display="flex";
};

function updateAngle(){

let v=parseFloat(angleInput.value)||0;

if(unit.value==="rad"){
angleDeg=v*180/Math.PI;
angleText.textContent=`${v.toFixed(2)} rad`;
}else{
angleDeg=v;
angleText.textContent=`${v}°`;
}

applyTransform();
}

function applyTransform(){

let t=`rotate(${angleDeg}deg)`;

if(mirror.checked){
t+=` scaleX(-1)`;
}

img.style.transform=t;
}

angleInput.addEventListener("input",updateAngle);
unit.addEventListener("change",updateAngle);
mirror.addEventListener("change",applyTransform);

/* DOWNLOAD */
document.getElementById("downloadBtn").onclick=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const temp=new Image();
temp.src=img.src;

temp.onload=()=>{

const w=temp.width;
const h=temp.height;

canvas.width=w;
canvas.height=h;

ctx.translate(w/2,h/2);
ctx.rotate(angleDeg*Math.PI/180);

if(mirror.checked){
ctx.scale(-1,1);
}

ctx.drawImage(temp,-w/2,-h/2);

const url=canvas.toDataURL("image/png");

const a=document.createElement("a");
a.href=url;
a.download="toolforge-rotate.png";
a.click();

};

};

</script>

</body>

</html>
