<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recadrage d’Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}

.workspace{
margin-top:20px;
height:500px;
background:#0B1220;
border-radius:15px;
display:none;
position:relative;
overflow:hidden;
align-items:center;
justify-content:center;
}

.img{
max-width:100%;
max-height:100%;
display:block;
position:relative;
}

.crop{
position:absolute;
border:2px solid var(--accent);
width:180px;
height:180px;
top:50px;
left:50px;
cursor:move;
}

.handle{
position:absolute;
width:10px;
height:10px;
background:var(--accent);
}

.tl{top:-5px;left:-5px;cursor:nwse-resize}
.tr{top:-5px;right:-5px;cursor:nesw-resize}
.bl{bottom:-5px;left:-5px;cursor:nesw-resize}
.br{bottom:-5px;right:-5px;cursor:nwse-resize}

.download{
display:none;
text-align:center;
padding:12px;
background:var(--accent);
color:white;
border-radius:10px;
text-decoration:none;
}

.status{
color:var(--muted);
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Recadrage d’Image</h1>

<p>Sélectionnez une zone puis recadrez.</p>

<input type="file" id="file" accept="image/*">

<div class="workspace" id="workspace">

<img id="img" class="img">

<div class="crop" id="crop">

<div class="handle tl"></div>
<div class="handle tr"></div>
<div class="handle bl"></div>
<div class="handle br"></div>

</div>

</div>

<button id="cropBtn">Recadrer</button>

<a id="download" class="download">Télécharger</a>

<div class="status" id="status"></div>

</div>

</div>

<script>

const file=document.getElementById("file");
const img=document.getElementById("img");
const workspace=document.getElementById("workspace");
const crop=document.getElementById("crop");
const cropBtn=document.getElementById("cropBtn");
const download=document.getElementById("download");
const status=document.getElementById("status");

let scale=1;
let imgW=0;
let imgH=0;

// LOAD IMAGE
file.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

img.src=URL.createObjectURL(f);

img.onload=()=>{

imgW=img.naturalWidth;
imgH=img.naturalHeight;

const maxW=700;
const maxH=450;

scale=Math.min(maxW/imgW,maxH/imgH,1);

img.style.width=imgW*scale+"px";
img.style.height=imgH*scale+"px";

workspace.style.display="flex";

status.textContent="Image chargée";
};
};

// MOVE crop ONLY inside workspace
let dragging=false;
let startX,startY,startLeft,startTop;

crop.onmousedown=e=>{
dragging=true;
startX=e.clientX;
startY=e.clientY;
startLeft=crop.offsetLeft;
startTop=crop.offsetTop;
};

window.onmouseup=()=>dragging=false;

window.onmousemove=e=>{
if(!dragging)return;

let x=startLeft+(e.clientX-startX);
let y=startTop+(e.clientY-startY);

// LIMIT BOUNDS
const maxX=workspace.clientWidth-crop.offsetWidth;
const maxY=workspace.clientHeight-crop.offsetHeight;

x=Math.max(0,Math.min(maxX,x));
y=Math.max(0,Math.min(maxY,y));

crop.style.left=x+"px";
crop.style.top=y+"px";
};

// CROP ACTION (preview + export ready)
cropBtn.onclick=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const imgRect=img.getBoundingClientRect();
const cropRect=crop.getBoundingClientRect();

const x=(cropRect.left-imgRect.left)/scale;
const y=(cropRect.top-imgRect.top)/scale;
const w=cropRect.width/scale;
const h=cropRect.height/scale;

canvas.width=w;
canvas.height=h;

ctx.drawImage(img,x,y,w,h,0,0,w,h);

const url=canvas.toDataURL("image/png");

// show preview directly in image area
img.src=url;

// show download
download.href=url;
download.download="toolforge-crop.png";
download.style.display="block";

status.textContent="Image recadrée";
};

</script>

</body>

</html>
