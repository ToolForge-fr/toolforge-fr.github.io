<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}

.workspace{
margin-top:20px;
height:500px;
background:#0B1220;
border-radius:15px;
display:none;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}

.box{
position:relative;
display:inline-block;
}

.box img{
display:block;
transform-origin:center;
}

.handle{
position:absolute;
width:14px;
height:14px;
background:var(--accent);
border-radius:2px;
}

.tl{top:-7px;left:-7px;cursor:nwse-resize}
.tr{top:-7px;right:-7px;cursor:nesw-resize}
.bl{bottom:-7px;left:-7px;cursor:nesw-resize}
.br{bottom:-7px;right:-7px;cursor:nwse-resize}

.t{top:-7px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.b{bottom:-7px;left:50%;transform:translateX(-50%);cursor:ns-resize}
.l{left:-7px;top:50%;transform:translateY(-50%);cursor:ew-resize}
.r{right:-7px;top:50%;transform:translateY(-50%);cursor:ew-resize}

.checkbox{
margin-top:10px;
color:var(--muted);
font-size:14px;
display:none;
}

.download{
display:none;
text-align:center;
padding:12px;
margin-top:10px;
background:var(--accent);
color:white;
border-radius:10px;
text-decoration:none;
}

.status{
color:var(--muted);
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Redimensionneur d’Image</h1>

<p>Redimensionnez vos images sans déformation involontaire.</p>

<input type="file" id="file" accept="image/*">

<div class="workspace" id="workspace">

<div class="box" id="box">

<img id="img">

<div class="handle tl"></div>
<div class="handle tr"></div>
<div class="handle bl"></div>
<div class="handle br"></div>

<div class="handle t"></div>
<div class="handle b"></div>
<div class="handle l"></div>
<div class="handle r"></div>

</div>

</div>

<div class="checkbox" id="ratioBox">
<label>
<input type="checkbox" id="ratio" checked>
Garder les proportions
</label>
</div>

<button id="export">Télécharger</button>

<a id="download" class="download">Télécharger</a>

<div class="status" id="status"></div>

</div>

</div>

<script>

const file=document.getElementById("file");
const img=document.getElementById("img");
const workspace=document.getElementById("workspace");

const ratio=document.getElementById("ratio");
const ratioBox=document.getElementById("ratioBox");

const download=document.getElementById("download");
const status=document.getElementById("status");

let naturalW,naturalH;
let w,h;
let scale=1;

let dragging=null;
let startX,startY,startW,startH;

file.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

img.src=URL.createObjectURL(f);

img.onload=()=>{

naturalW=img.naturalWidth;
naturalH=img.naturalHeight;

// FIT DANS WORKSPACE (important fix bug carré + trop grand)
const maxW=600;
const maxH=400;

scale=Math.min(maxW/naturalW,maxH/naturalH,1);

w=naturalW*scale;
h=naturalH*scale;

apply();

workspace.style.display="flex";
ratioBox.style.display="block";

status.textContent="Image chargée";
}
};

function apply(){
img.style.width=w+"px";
img.style.height=h+"px";
}

function start(type,e){
dragging=type;
startX=e.clientX;
startY=e.clientY;
startW=w;
startH=h;
}

document.querySelectorAll(".handle").forEach(h=>{
h.onmousedown=e=>{
start(h.classList[1],e);
};
});

window.onmouseup=()=>dragging=null;

window.onmousemove=e=>{
if(!dragging)return;

let dx=e.clientX-startX;
let dy=e.clientY-startY;

let newW=startW;
let newH=startH;

// resize logique
if(dragging.includes("r")) newW=startW+dx;
if(dragging.includes("l")) newW=startW-dx;
if(dragging.includes("b")) newH=startH+dy;
if(dragging.includes("t")) newH=startH-dy;

// ratio
if(ratio.checked){
const r=startW/startH;
newH=newW/r;
}

w=Math.max(30,newW);
h=Math.max(30,newH);

apply();
};

document.getElementById("export").onclick=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=naturalW*(w/(naturalW*scale));
canvas.height=naturalH*(h/(naturalH*scale));

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const url=canvas.toDataURL("image/png");

download.href=url;
download.download="toolforge-resize.png";
download.style.display="block";

status.textContent="Image exportée";

};

</script>

</body>

</html>
