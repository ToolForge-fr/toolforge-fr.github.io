<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’Image - ToolForge</title>

<meta name="description" content="Redimensionnez et recadrez vos images gratuitement en ligne.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">


<style>

:root{
  --bg:#0B1220;
  --card:#151F32;
  --border:#24324D;
  --text:#fff;
  --muted:#A8B3CF;
  --accent:#4F8CFF;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  width:min(900px,92%);
  margin:auto;
  padding:40px 0;
}

.card{
  background:var(--card);
  border:1px solid(var(--border));
  border-radius:18px;
  padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}


img{
width:100%;
margin-top:10px;
border-radius:10px;
}


.download{
display:block;
text-align:center;
padding:12px;
margin-top:10px;
background:var(--accent);
color:white;
text-decoration:none;
border-radius:10px;
display:none;
}


.status{
margin-top:10px;
color:var(--muted);
}


.crop-area{
max-height:500px;
overflow:hidden;
}


</style>

</head>


<body>


<div class="container">


<div class="card">


<h1>Redimensionneur d’Image</h1>


<p>
Redimensionnez et recadrez vos images sans installation.
</p>



<input type="file" id="file" accept="image/*">



<div class="crop-area">

<img id="preview">

</div>




<label>Largeur</label>

<input type="number" id="width" placeholder="Largeur">


<label>Hauteur</label>

<input type="number" id="height" placeholder="Hauteur">


<button id="resize">
Redimensionner
</button>



<a id="download" class="download">
Télécharger
</a>



<div class="status" id="status"></div>


</div>

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>


<script>


const fileInput=document.getElementById("file");
const preview=document.getElementById("preview");
const resizeBtn=document.getElementById("resize");

const download=document.getElementById("download");
const status=document.getElementById("status");


const widthInput=document.getElementById("width");
const heightInput=document.getElementById("height");


let cropper;



fileInput.addEventListener("change",e=>{


const file=e.target.files[0];


if(!file)return;



preview.src=URL.createObjectURL(file);



if(cropper){
cropper.destroy();
}



cropper=new Cropper(preview,{

viewMode:2,

autoCropArea:1,

background:false,

responsive:true,

guides:false,

center:false,

highlight:false,

cropBoxMovable:true,

cropBoxResizable:true,


crop(e){

widthInput.value=Math.round(e.detail.width);

heightInput.value=Math.round(e.detail.height);

}

});



status.textContent="Image chargée";


});





resizeBtn.onclick=()=>{


if(!cropper)return;



const canvas=cropper.getCroppedCanvas({

width:Number(widthInput.value),

height:Number(heightInput.value)

});



const url=canvas.toDataURL("image/png");



preview.src=url;


download.href=url;

download.download="toolforge-image.png";

download.style.display="block";


status.textContent="Image redimensionnée";


};



</script>


</body>

</html>
