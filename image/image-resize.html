<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redimensionneur d’Image - ToolForge</title>

<meta name="description" content="Redimensionnez vos images gratuitement en ligne.">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}


.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}


.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}


h1{
margin-bottom:10px;
}


p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6;
}


input,button{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid(var(--border));
margin-bottom:10px;
background:#0B1220;
color:white;

}


button{

background:var(--accent);
cursor:pointer;
font-weight:600;

}



img{

width:100%;
margin-top:10px;
border-radius:10px;

}



.download{

display:none;
text-align:center;
padding:12px;
margin-top:10px;
background:var(--accent);
color:white;
text-decoration:none;
border-radius:10px;

}



.status{

margin-top:10px;
color:var(--muted);

}



</style>

</head>



<body>


<div class="container">


<div class="card">


<h1>Redimensionneur d’Image</h1>


<p>
Modifiez la largeur et la hauteur de vos images sans installation.
</p>



<input type="file" id="file" accept="image/*">



<label>Largeur</label>

<input type="number" id="width">



<label>Hauteur</label>

<input type="number" id="height">



<label>

<input type="checkbox" id="ratio" checked>

Garder les proportions

</label>



<button id="resize">

Redimensionner

</button>



<img id="preview">



<a id="download" class="download">

Télécharger

</a>



<div class="status" id="status"></div>


</div>


</div>





<script>


const fileInput=document.getElementById("file");

const preview=document.getElementById("preview");

const widthInput=document.getElementById("width");

const heightInput=document.getElementById("height");

const ratio=document.getElementById("ratio");

const resizeBtn=document.getElementById("resize");

const download=document.getElementById("download");

const status=document.getElementById("status");


let imgFile;

let originalRatio;





fileInput.onchange=e=>{


imgFile=e.target.files[0];


if(!imgFile)return;



const img=new Image();



img.onload=()=>{


widthInput.value=img.width;

heightInput.value=img.height;


originalRatio=img.width/img.height;


preview.src=img.src;


};



img.src=URL.createObjectURL(imgFile);



status.textContent="Image chargée";


};





widthInput.oninput=()=>{


if(ratio.checked && originalRatio){

heightInput.value=
Math.round(widthInput.value/originalRatio);

}


};





heightInput.oninput=()=>{


if(ratio.checked && originalRatio){

widthInput.value=
Math.round(heightInput.value*originalRatio);

}


};







resizeBtn.onclick=()=>{


if(!imgFile)return;



const img=new Image();



img.onload=()=>{


const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");


canvas.width=Number(widthInput.value);

canvas.height=Number(heightInput.value);



ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);



const url=canvas.toDataURL("image/png");



preview.src=url;


download.href=url;

download.download="toolforge-resize.png";

download.style.display="block";


status.textContent="Image redimensionnée";


};



img.src=URL.createObjectURL(imgFile);



};


</script>


</body>

</html>
