<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recadrage d’Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}

.workspace{
margin-top:20px;
height:500px;
background:#0B1220;
border-radius:15px;
display:none;
position:relative;
overflow:hidden;
justify-content:center;
align-items:center;
}

#img{
max-width:100%;
max-height:100%;
display:block;
}

.crop{
position:absolute;
width:180px;
height:180px;
border:2px solid var(--accent);
top:60px;
left:60px;
cursor:move;
}

.preview{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.preview img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
border:1px solid var(--border);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Recadrage d’image</h1>

<p>Recadrez et générez plusieurs versions sans écraser l’original.</p>

<input type="file" id="file" accept="image/*">

<div class="workspace" id="workspace">

<img id="img">

<div class="crop" id="crop"></div>

</div>

<button id="cropBtn">Recadrer</button>

<div class="preview" id="preview"></div>

</div>

</div>

<script>

const file=document.getElementById("file");
const img=document.getElementById("img");
const workspace=document.getElementById("workspace");
const crop=document.getElementById("crop");
const preview=document.getElementById("preview");

let originalSrc="";
let scale=1;
let imgW=0;
let imgH=0;

// LOAD IMAGE
file.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

originalSrc=URL.createObjectURL(f);
img.src=originalSrc;

img.onload=()=>{

imgW=img.naturalWidth;
imgH=img.naturalHeight;

const maxW=700;
const maxH=450;

scale=Math.min(maxW/imgW,maxH/imgH,1);

img.style.width=imgW*scale+"px";
img.style.height=imgH*scale+"px";

workspace.style.display="flex";
};
};

// MOVE crop (clamp correct)
let dragging=false;
let startX,startY,startLeft,startTop;

crop.onmousedown=e=>{
dragging=true;
startX=e.clientX;
startY=e.clientY;
startLeft=crop.offsetLeft;
startTop=crop.offsetTop;
};

window.onmouseup=()=>dragging=false;

window.onmousemove=e=>{
if(!dragging)return;

let x=startLeft+(e.clientX-startX);
let y=startTop+(e.clientY-startY);

const maxX=workspace.clientWidth-crop.offsetWidth;
const maxY=workspace.clientHeight-crop.offsetHeight;

crop.style.left=Math.max(0,Math.min(maxX,x))+"px";
crop.style.top=Math.max(0,Math.min(maxY,y))+"px";
};

// CROP WITHOUT REPLACING IMAGE
document.getElementById("cropBtn").onclick=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const imgRect=img.getBoundingClientRect();
const cropRect=crop.getBoundingClientRect();

// conversion coords
const x=(cropRect.left-imgRect.left)/scale;
const y=(cropRect.top-imgRect.top)/scale;
const w=cropRect.width/scale;
const h=cropRect.height/scale;

// draw from ORIGINAL IMAGE ONLY
const tempImg=new Image();
tempImg.src=originalSrc;

tempImg.onload=()=>{

canvas.width=w;
canvas.height=h;

ctx.drawImage(tempImg,x,y,w,h,0,0,w,h);

const url=canvas.toDataURL("image/png");

// add preview (NOT replace main image)
const im=document.createElement("img");
im.src=url;
preview.appendChild(im);

};

};

</script>

</body>

</html>
