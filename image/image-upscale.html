<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amélioration d’Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6;
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}

/* PREVIEW BEFORE */
.preview-before{
display:none;
margin-top:15px;
}

.preview-before img{
width:100%;
border-radius:10px;
}

/* COMPARE */
.compare{
position:relative;
width:100%;
height:500px;
overflow:hidden;
border-radius:10px;
margin-top:20px;
display:none;
background:#0B1220;
}

.compare img{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
}

/* AFTER */
.after{
clip-path:inset(0 50% 0 0);
filter:brightness(1.15) contrast(1.2) saturate(1.1);
}

/* slider */
.slider{
position:absolute;
top:0;
left:50%;
height:100%;
width:3px;
background:white;
cursor:ew-resize;
}

/* handle */
.handle{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:42px;
height:42px;
border-radius:50%;
background:var(--accent);
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
box-shadow:0 0 12px #000;
}

/* download */
.download{
display:block;
text-align:center;
padding:12px;
margin-top:10px;
background:var(--accent);
color:white;
text-decoration:none;
border-radius:10px;
display:none;
}

.status{
margin-top:10px;
color:var(--muted);
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Amélioration d’image</h1>

<p>Améliore contraste, luminosité et netteté directement dans le navigateur.</p>

<input type="file" id="file" accept="image/*">

<label>Niveau d’amélioration (0.5 → 2)</label>
<input type="number" id="level" value="1.3" min="0.5" max="2" step="0.1">

<button id="apply">Améliorer</button>

<div class="preview-before" id="previewBefore">
<img id="beforePreview">
</div>

<div class="compare" id="compare">

<img id="before">
<img id="after" class="after">

<div class="slider" id="slider">
<div class="handle">⇆</div>
</div>

</div>

<a id="download" class="download">Télécharger</a>

<div class="status" id="status"></div>

</div>

</div>

<script>

const fileInput=document.getElementById("file");
const levelInput=document.getElementById("level");

const before=document.getElementById("before");
const after=document.getElementById("after");
const beforePreview=document.getElementById("beforePreview");

const compare=document.getElementById("compare");
const slider=document.getElementById("slider");

const download=document.getElementById("download");
const status=document.getElementById("status");

let imgFile=null;

/* LOAD */
fileInput.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

imgFile=f;

const url=URL.createObjectURL(f);

before.src=url;
beforePreview.src=url;

document.querySelector(".preview-before").style.display="block";

compare.style.display="none";
download.style.display="none";
status.textContent="Image chargée";
};

/* APPLY ENHANCE */
document.getElementById("apply").onclick=()=>{

if(!imgFile)return;

const img=new Image();
img.src=URL.createObjectURL(imgFile);

img.onload=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.filter=
`brightness(${levelInput.value})
contrast(${levelInput.value})
saturate(${levelInput.value})`;

ctx.drawImage(img,0,0);

const url=canvas.toDataURL("image/jpeg");

after.src=url;

compare.style.display="block";
slider.style.left="50%";

download.href=url;
download.download="toolforge-enhanced.jpg";
download.style.display="block";

status.textContent="Amélioration terminée";
};

};

/* SLIDER */
let dragging=false;

compare.addEventListener("mousedown",()=>dragging=true);
window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",(e)=>{

if(!dragging)return;

const rect=compare.getBoundingClientRect();

let x=e.clientX-rect.left;
x=Math.max(0,Math.min(x,rect.width));

const percent=(x/rect.width)*100;

slider.style.left=percent+"%";
after.style.clipPath=`inset(0 ${100-percent}% 0 0)`;

});

</script>

</body>

</html>
