<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convertisseur Audio - ToolForge</title>
<meta name="description" content="Convertissez vos fichiers audio en MP3, WAV, OGG, WEBM ou M4A directement en ligne.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js"></script>

<style>
:root{
  --bg:#0B1220;
  --card:#151F32;
  --border:#24324D;
  --text:#fff;
  --muted:#A8B3CF;
  --accent:#4F8CFF;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  width:min(900px,92%);
  margin:auto;
  padding:40px 0;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:25px;
}

h1{margin-bottom:10px}
p{color:var(--muted);margin-bottom:20px;line-height:1.6}

input, select, button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-bottom:10px;
  background:#0B1220;
  color:white;
}

button{
  background:var(--accent);
  cursor:pointer;
  font-weight:600;
}

audio{
  width:100%;
  margin-top:10px;
}

.status{
  margin-top:10px;
  color:var(--muted);
}

a.download{
  display:block;
  text-align:center;
  padding:12px;
  margin-top:10px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Convertisseur Audio</h1>

<p>Convertis tes fichiers audio en MP3, WAV, OGG, WEBM ou M4A.</p>

<input type="file" id="file" accept="audio/*">

<select id="format">
  <option value="mp3">MP3</option>
  <option value="wav">WAV</option>
  <option value="ogg">OGG</option>
  <option value="webm">WEBM</option>
  <option value="m4a">M4A</option>
</select>

<button id="convert">Convertir</button>

<audio id="preview" controls></audio>

<a id="download" class="download">Télécharger</a>

<div class="status" id="status"></div>

</div>

</div>

<script>

const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log:false });

const fileInput = document.getElementById('file');
const formatSelect = document.getElementById('format');
const convertBtn = document.getElementById('convert');
const preview = document.getElementById('preview');
const download = document.getElementById('download');
const status = document.getElementById('status');

let fileData;
let baseName = "audio";

fileInput.addEventListener('change', async (e) => {

const file = e.target.files[0];
if(!file) return;

fileData = file;
baseName = file.name.split('.')[0];

preview.src = URL.createObjectURL(file);

status.textContent = "Fichier chargé";

});

convertBtn.addEventListener('click', async () => {

if(!fileData) return;

status.textContent = "Chargement moteur...";

if(!ffmpeg.isLoaded()){
await ffmpeg.load();
}

const inputExt = fileData.name.split('.').pop();
const format = formatSelect.value;

const inputName = `input.${inputExt}`;
const outputName = `output.${format}`;

ffmpeg.FS('writeFile', inputName, await fetchFile(fileData));

status.textContent = "Conversion en cours...";

let args = ['-i', inputName];

if(format === 'mp3'){
args.push('-c:a', 'libmp3lame', outputName);
}
else if(format === 'wav'){
args.push(outputName);
}
else if(format === 'ogg'){
args.push('-c:a', 'libvorbis', outputName);
}
else if(format === 'webm'){
args.push('-c:a', 'libopus', outputName);
}
else if(format === 'm4a'){
args.push('-c:a', 'aac', outputName);
}

await ffmpeg.run(...args);

const data = ffmpeg.FS('readFile', outputName);

const mimeMap = {
mp3:'audio/mpeg',
wav:'audio/wav',
ogg:'audio/ogg',
webm:'audio/webm',
m4a:'audio/mp4'
};

const blob = new Blob([data.buffer], { type: mimeMap[format] });

const url = URL.createObjectURL(blob);

preview.src = url;

download.href = url;
download.download = `toolforge-${baseName}.${format}`;
download.style.display = "block";

status.textContent = "Conversion terminée";

});

</script>

</body>
</html>
