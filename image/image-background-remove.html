<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suppression de fond - ToolForge</title>

<meta name="description" content="Supprimez automatiquement l’arrière-plan de vos images directement dans votre navigateur.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}


body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}


.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}


.card{
background:var(--card);
border:1px solid(var(--border));
border-radius:18px;
padding:25px;
}


h1{
margin-bottom:10px;
}


p{
color:var(--muted);
margin-bottom:20px;
line-height:1.6;
}


input,button{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;

}


button{

background:var(--accent);
cursor:pointer;
font-weight:600;

}


/* couleur */

.color-zone{

display:none;
margin-bottom:15px;

}


#selectedColor{

width:45px;
height:45px;

border-radius:50%;

background:#00ff00;

border:2px solid white;

cursor:pointer;

}



#colorPanel{

display:none;

padding:15px;

border:1px solid var(--border);

border-radius:15px;

margin-top:15px;

}



#colorBox{

height:220px;

width:100%;

border-radius:12px;

position:relative;

cursor:pointer;


background:
linear-gradient(to right,#fff,transparent),
linear-gradient(to bottom,#000,transparent),
hsl(120,100%,50%);

}



#colorCursor{

position:absolute;

width:18px;
height:18px;

border-radius:50%;

border:2px solid white;

box-shadow:0 0 5px black;

left:50%;
top:50%;

}



#hue{

height:15px;

margin-top:15px;

}



#pipettePreview{

position:fixed;

width:90px;

height:90px;

border-radius:50%;

border:3px solid white;

pointer-events:none;

display:none;

z-index:999;

box-shadow:0 0 15px black;

}





.preview-before{

display:none;

margin-top:20px;

}



.preview-before img{

width:100%;

border-radius:10px;

cursor:crosshair;

}




.compare{

position:relative;

width:100%;

height:500px;

overflow:hidden;

border-radius:10px;

margin-top:20px;

display:none;

background:#0B1220;

}



.compare img{

position:absolute;

width:100%;

height:100%;

object-fit:contain;

}



.before{

clip-path:inset(0 50% 0 0);

z-index:2;

}



.after{

clip-path:inset(0 0 0 50%);

z-index:2;

}



.slider{

position:absolute;

top:0;

left:50%;

height:100%;

width:3px;

background:white;

z-index:5;

}



.handle{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:42px;

height:42px;

border-radius:50%;

background:var(--accent);

display:flex;

align-items:center;

justify-content:center;

font-size:20px;

box-shadow:0 0 12px #000;

}



.download{

display:none;

text-align:center;

padding:12px;

margin-top:10px;

background:var(--accent);

color:white;

text-decoration:none;

border-radius:10px;

}



.status{

margin-top:10px;

color:var(--muted);

}

</style>

</head>


<body>


<div class="container">

<div class="card">


<h1>Suppression de fond</h1>


<p>
Supprimez automatiquement l’arrière-plan de vos images directement dans le navigateur.
</p>


<input type="file" id="file" accept="image/*">



<label style="display:flex;align-items:center;gap:10px">

<input id="greenMode" type="checkbox" style="width:auto">

Fond vert

</label>



<div class="color-zone">


<div id="selectedColor"></div>



<div id="colorPanel">


<div id="colorBox">

<div id="colorCursor"></div>

</div>


<input id="hue" type="range" min="0" max="360" value="120">



<button id="validateColor">
Valider
</button>


</div>


</div>





<button id="picker">
🖌 Pipette
</button>



<button id="remove">
Supprimer le fond
</button>




<div class="preview-before">

<img id="beforePreview">

</div>





<div class="compare" id="compare">


<img id="before">


<img id="after" class="after">



<div class="slider" id="slider">

<div class="handle">
⇆
</div>


</div>


</div>




<a id="download" class="download">
Télécharger
</a>



<div class="status" id="status"></div>


</div>

</div>



<div id="pipettePreview"></div>

<script>


const fileInput=document.getElementById("file");
const removeBtn=document.getElementById("remove");

const before=document.getElementById("before");
const after=document.getElementById("after");
const beforePreview=document.getElementById("beforePreview");

const compare=document.getElementById("compare");
const slider=document.getElementById("slider");

const download=document.getElementById("download");
const status=document.getElementById("status");


const greenMode=document.getElementById("greenMode");

const selectedColorBox=document.getElementById("selectedColor");
const colorPanel=document.getElementById("colorPanel");
const colorBox=document.getElementById("colorBox");
const colorCursor=document.getElementById("colorCursor");
const hue=document.getElementById("hue");
const validateColor=document.getElementById("validateColor");

const picker=document.getElementById("picker");
const pipettePreview=document.getElementById("pipettePreview");



let imageFile=null;
let selectedColor=[0,255,0];
let picking=false;







greenMode.onchange=()=>{


if(greenMode.checked){

document.querySelector(".color-zone").style.display="block";

}

else{

document.querySelector(".color-zone").style.display="none";
colorPanel.style.display="none";

}


};







selectedColorBox.onclick=()=>{

colorPanel.style.display="block";

};







function updateColor(){


let h=hue.value;



colorBox.style.background=

`
linear-gradient(to right,#fff,transparent),
linear-gradient(to bottom,#000,transparent),
hsl(${h},100%,50%)
`;



let canvas=document.createElement("canvas");

canvas.width=1;
canvas.height=1;



let ctx=canvas.getContext("2d");


ctx.fillStyle=
`hsl(${h},100%,50%)`;

ctx.fillRect(0,0,1,1);



let p=
ctx.getImageData(0,0,1,1).data;



selectedColor=[

p[0],
p[1],
p[2]

];



selectedColorBox.style.background=

`rgb(${p[0]},${p[1]},${p[2]})`;


}






colorBox.onclick=e=>{


let rect=
colorBox.getBoundingClientRect();



let x=e.clientX-rect.left;

let y=e.clientY-rect.top;



colorCursor.style.left=x+"px";

colorCursor.style.top=y+"px";


updateColor();


};





hue.oninput=updateColor;






validateColor.onclick=()=>{


colorPanel.style.display="none";


status.textContent=
"Couleur validée";


};









picker.onclick=()=>{


picking=true;


status.textContent=
"Sélectionnez une couleur";


};









beforePreview.addEventListener(
"mousemove",
e=>{


if(!picking)return;



pipettePreview.style.display="block";

pipettePreview.style.left=
e.clientX+15+"px";


pipettePreview.style.top=
e.clientY+15+"px";





const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");



canvas.width=
beforePreview.naturalWidth;


canvas.height=
beforePreview.naturalHeight;



ctx.drawImage(
beforePreview,
0,
0
);





const rect=
beforePreview.getBoundingClientRect();




let x=
(e.clientX-rect.left)
/
rect.width*
canvas.width;




let y=
(e.clientY-rect.top)
/
rect.height*
canvas.height;





let p=
ctx.getImageData(
Math.floor(x),
Math.floor(y),
1,
1
).data;



pipettePreview.style.background=

`rgb(${p[0]},${p[1]},${p[2]})`;



});











beforePreview.onclick=e=>{


if(!picking)return;



picking=false;


pipettePreview.style.display="none";




const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");



canvas.width=
beforePreview.naturalWidth;


canvas.height=
beforePreview.naturalHeight;



ctx.drawImage(
beforePreview,
0,
0
);





const rect=
beforePreview.getBoundingClientRect();




let x=
(e.clientX-rect.left)
/
rect.width*
canvas.width;



let y=
(e.clientY-rect.top)
/
rect.height*
canvas.height;





let p=
ctx.getImageData(
Math.floor(x),
Math.floor(y),
1,
1
).data;




selectedColor=[

p[0],
p[1],
p[2]

];





selectedColorBox.style.background=

`rgb(${p[0]},${p[1]},${p[2]})`;





let hsl=
rgbToHsl(
p[0],
p[1],
p[2]
);




hue.value=hsl[0];




colorCursor.style.left=
hsl[1]+"%";


colorCursor.style.top=
(100-hsl[2])+"%";



colorPanel.style.display="block";



status.textContent=
"Couleur sélectionnée";


};









fileInput.onchange=e=>{


imageFile=e.target.files[0];

if(!imageFile)return;



let url=
URL.createObjectURL(imageFile);



before.src=url;

beforePreview.src=url;



after.src="";

compare.style.display="none";

download.style.display="none";



document.querySelector(".preview-before")
.style.display="block";



status.textContent=
"Image chargée";


};









removeBtn.onclick=()=>{


if(!imageFile)return;



let img=new Image();



img.src=
URL.createObjectURL(imageFile);



img.onload=()=>{



let canvas=document.createElement("canvas");

let ctx=canvas.getContext("2d");



canvas.width=img.width;

canvas.height=img.height;



ctx.drawImage(img,0,0);



let imageData=
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



let data=imageData.data;



let bg=[0,0,0];

let count=0;





for(
let x=0;
x<canvas.width;
x+=20
){


let i=x*4;


bg[0]+=data[i];

bg[1]+=data[i+1];

bg[2]+=data[i+2];


count++;


}




bg[0]/=count;
bg[1]/=count;
bg[2]/=count;









for(let i=0;i<data.length;i+=4){



let r=data[i];
let g=data[i+1];
let b=data[i+2];



let remove=false;






if(greenMode.checked){



let d=Math.sqrt(

(r-selectedColor[0])**2+

(g-selectedColor[1])**2+

(b-selectedColor[2])**2

);



if(d<100)
remove=true;


}

else{


let d=Math.sqrt(

(r-bg[0])**2+

(g-bg[1])**2+

(b-bg[2])**2

);



if(d<90)
remove=true;


}







if(remove){

data[i+3]=0;

}



}







ctx.putImageData(
imageData,
0,
0
);





let url=
canvas.toDataURL("image/png");





after.src=url;


compare.style.display="block";



download.href=url;


download.download=
"toolforge-transparent.png";



download.style.display="block";



status.textContent=
"Fond supprimé";


};


};









let dragging=false;


compare.onmousedown=()=>dragging=true;


window.onmouseup=()=>dragging=false;






window.onmousemove=e=>{


if(!dragging)return;



let rect=
compare.getBoundingClientRect();



let x=
e.clientX-rect.left;



x=Math.max(
0,
Math.min(
x,
rect.width
)
);




let percent=
x/rect.width*100;





slider.style.left=
percent+"%";




after.style.clipPath=
`inset(0 ${100-percent}% 0 0)`;



before.style.clipPath=
`inset(0 0 0 ${percent}%)`;



};









function rgbToHsl(r,g,b){


r/=255;
g/=255;
b/=255;


let max=Math.max(r,g,b);
let min=Math.min(r,g,b);


let h,s,l=(max+min)/2;



if(max===min){

h=0;
s=0;

}

else{


let d=max-min;


s=l>0.5
?
d/(2-max-min)
:
d/(max+min);




switch(max){


case r:

h=(g-b)/d+(g<b?6:0);

break;



case g:

h=(b-r)/d+2;

break;



case b:

h=(r-g)/d+4;

break;


}



h*=60;


}



return [

Math.round(h),

Math.round(s*100),

Math.round(l*100)

];


}



</script>


</body>
</html>
