<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recadrage Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
}

/* WORKSPACE */
.workspace{
margin-top:20px;
height:500px;
background:#0B1220;
border-radius:15px;
display:none;
position:relative;
overflow:hidden;
justify-content:center;
align-items:center;
}

#img{
max-width:100%;
max-height:100%;
display:block;
position:relative;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
pointer-events:none;
}

/* CUTOUT HOLE */
.cutout{
position:absolute;
border:2px solid var(--accent);
background:transparent;
box-shadow:0 0 0 9999px rgba(0,0,0,0.45);
cursor:move;
}

/* HANDLES */
.handle{
position:absolute;
width:10px;
height:10px;
background:var(--accent);
}

.tl{top:-5px;left:-5px;cursor:nwse-resize}
.tr{top:-5px;right:-5px;cursor:nesw-resize}
.bl{bottom:-5px;left:-5px;cursor:nesw-resize}
.br{bottom:-5px;right:-5px;cursor:nwse-resize}

/* PREVIEW */
.preview{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.preview-item{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:10px;
}

.preview-item img{
width:100%;
border-radius:10px;
margin-bottom:8px;
}

.download-btn{
display:block;
text-align:center;
padding:10px;
background:var(--accent);
color:white;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Recadrage d’image</h1>

<p>Style mobile avec zone grisée + export propre.</p>

<input type="file" id="file" accept="image/*">

<div class="workspace" id="workspace">

<img id="img">

<div class="overlay"></div>

<div class="cutout" id="crop">

<div class="handle tl"></div>
<div class="handle tr"></div>
<div class="handle bl"></div>
<div class="handle br"></div>

</div>

</div>

<button id="cropBtn">Recadrer</button>

<div class="preview" id="preview"></div>

</div>

</div>

<script>

const file=document.getElementById("file");
const img=document.getElementById("img");
const workspace=document.getElementById("workspace");
const crop=document.getElementById("crop");
const preview=document.getElementById("preview");

let original=null;
let scale=1;
let naturalW=0;
let naturalH=0;

// LOAD
file.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

original=URL.createObjectURL(f);
img.src=original;

img.onload=()=>{

naturalW=img.naturalWidth;
naturalH=img.naturalHeight;

scale=Math.min(700/naturalW,450/naturalH,1);

img.style.width=naturalW*scale+"px";
img.style.height=naturalH*scale+"px";

workspace.style.display="flex";
};
};

// MOVE + RESIZE WITH LIMITS
let mode=null;
let sx,sy,sl,st,sw,sh;

function start(m,e){
mode=m;
sx=e.clientX;
sy=e.clientY;
sl=crop.offsetLeft;
st=crop.offsetTop;
sw=crop.offsetWidth;
sh=crop.offsetHeight;
}

crop.onmousedown=e=>{
start("move",e);
};

document.querySelectorAll(".handle").forEach(h=>{
h.onmousedown=e=>{
e.stopPropagation();
start(h.classList[1],e);
};
});

window.onmouseup=()=>mode=null;

window.onmousemove=e=>{
if(!mode)return;

let dx=e.clientX-sx;
let dy=e.clientY-sy;

let x=sl;
let y=st;
let w=sw;
let h=sh;

if(mode==="move"){
x=sl+dx;
y=st+dy;
}

if(mode==="tl"){
x=sl+dx;
y=st+dy;
w=sw-dx;
h=sh-dy;
}

if(mode==="tr"){
y=st+dy;
w=sw+dx;
h=sh-dy;
}

if(mode==="bl"){
x=sl+dx;
w=sw-dx;
h=sh+dy;
}

if(mode==="br"){
w=sw+dx;
h=sh+dy;
}

// LIMIT TO IMAGE AREA
const maxW=workspace.clientWidth;
const maxH=workspace.clientHeight;

w=Math.max(40,Math.min(w,maxW-x));
h=Math.max(40,Math.min(h,maxH-y));

x=Math.max(0,Math.min(x,maxW-w));
y=Math.max(0,Math.min(y,maxH-h));

crop.style.left=x+"px";
crop.style.top=y+"px";
crop.style.width=w+"px";
crop.style.height=h+"px";
};

// CROP EXPORT
document.getElementById("cropBtn").onclick=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const imgRect=img.getBoundingClientRect();
const cropRect=crop.getBoundingClientRect();

const x=(cropRect.left-imgRect.left)/scale;
const y=(cropRect.top-imgRect.top)/scale;
const w=cropRect.width/scale;
const h=cropRect.height/scale;

const temp=new Image();
temp.src=original;

temp.onload=()=>{

canvas.width=w;
canvas.height=h;

ctx.drawImage(temp,x,y,w,h,0,0,w,h);

const url=canvas.toDataURL("image/png");

// create preview block
const box=document.createElement("div");
box.className="preview-item";

const im=document.createElement("img");
im.src=url;

const a=document.createElement("a");
a.className="download-btn";
a.textContent="Télécharger";
a.href=url;
a.download="toolforge-crop.png";

box.appendChild(im);
box.appendChild(a);
preview.appendChild(box);

};

};

</script>

</body>

</html>
