<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotation Image - ToolForge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0B1220;
--card:#151F32;
--border:#24324D;
--text:#fff;
--muted:#A8B3CF;
--accent:#4F8CFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,92%);
margin:auto;
padding:40px 0;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
}

h1{margin-bottom:10px}

p{
color:var(--muted);
margin-bottom:20px;
}

/* inputs */
input,button,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:12px;
background:#0B1220;
color:white;
}

button{
background:var(--accent);
cursor:pointer;
font-weight:600;
margin-top:10px;
}

/* stage */
.stage{
margin-top:20px;
display:none;
justify-content:center;
align-items:center;
height:500px;
background:#0B1220;
border-radius:15px;
position:relative;
overflow:hidden;
}

/* image */
#img{
max-width:100%;
max-height:100%;
transform-origin:center center;
}

/* wheel (réduite) */
.wheel{
position:absolute;
width:70px;
height:70px;
border-radius:50%;
border:2px solid var(--accent);
background:rgba(11,18,32,0.4);
cursor:grab;
display:flex;
align-items:center;
justify-content:center;
}

.wheel::after{
content:"";
width:8px;
height:8px;
background:var(--accent);
border-radius:50%;
position:absolute;
top:6px;
}

/* controls */
.controls{
display:flex;
gap:10px;
margin-top:10px;
}

.controls input{
flex:2;
}

.controls select{
flex:1;
}

/* mirror line */
.mirror{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
color:var(--muted);
}

.mirror input{
width:auto;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Rotation d’image</h1>

<p>Rotation libre avec roue interactive et miroir.</p>

<input type="file" id="file" accept="image/*">

<div class="stage" id="stage">

<img id="img">

<div class="wheel" id="wheel"></div>

</div>

<!-- angle -->
<div class="controls">
<input type="number" id="angleInput" value="0">
<select id="unit">
<option value="deg">Degrés</option>
<option value="rad">Radians</option>
</select>
</div>

<!-- mirror (aligné gauche + texte à côté) -->
<div class="mirror">
<input type="checkbox" id="mirror">
<label for="mirror">Image miroir</label>
</div>

<button id="downloadBtn">Télécharger</button>

</div>

</div>

<script>

const file=document.getElementById("file");
const img=document.getElementById("img");
const stage=document.getElementById("stage");
const wheel=document.getElementById("wheel");
const angleInput=document.getElementById("angleInput");
const unit=document.getElementById("unit");
const mirror=document.getElementById("mirror");

let angleDeg=0;
let dragging=false;

/* load image */
file.onchange=e=>{
const f=e.target.files[0];
if(!f)return;

img.src=URL.createObjectURL(f);
stage.style.display="flex";
};

/* ROTATION GLOBAL (PAS JUSTE CERCLE) */
stage.addEventListener("mousedown",(e)=>{
dragging=true;
updateFromMouse(e);
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",(e)=>{
if(!dragging)return;
updateFromMouse(e);
});

function updateFromMouse(e){

const rect=stage.getBoundingClientRect();
const cx=rect.left+rect.width/2;
const cy=rect.top+rect.height/2;

const dx=e.clientX-cx;
const dy=e.clientY-cy;

angleDeg=Math.atan2(dy,dx)*(180/Math.PI)+90;

angleInput.value=Math.round(angleDeg);
applyTransform();

/* roue suit angle */
wheel.style.transform=`rotate(${angleDeg}deg)`;
}

/* input angle */
function updateAngle(){

let v=parseFloat(angleInput.value)||0;

if(unit.value==="rad"){
angleDeg=v*180/Math.PI;
}else{
angleDeg=v;
}

applyTransform();
wheel.style.transform=`rotate(${angleDeg}deg)`;
}

angleInput.addEventListener("input",updateAngle);
unit.addEventListener("change",updateAngle);
mirror.addEventListener("change",applyTransform);

/* apply */
function applyTransform(){

let t=`rotate(${angleDeg}deg)`;

if(mirror.checked){
t+=` scaleX(-1)`;
}

img.style.transform=t;
}

/* download */
document.getElementById("downloadBtn").onclick=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const temp=new Image();
temp.src=img.src;

temp.onload=()=>{

const w=temp.width;
const h=temp.height;

canvas.width=w;
canvas.height=h;

ctx.translate(w/2,h/2);
ctx.rotate(angleDeg*Math.PI/180);

if(mirror.checked){
ctx.scale(-1,1);
}

ctx.drawImage(temp,-w/2,-h/2);

const url=canvas.toDataURL("image/png");

const a=document.createElement("a");
a.href=url;
a.download="toolforge-rotate.png";
a.click();

};

};

</script>

</body>

</html>
